<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>body{margin:0;background:#222} canvas{background:#1a2342;display:block;margin:0 auto}</style>
  </head>
  <body>
    <canvas id="c" width="900" height="600"></canvas>
    <script type="module">
      import { preloadAssets, getImage, drawImageCentered, drawImageContain } from '/src/art/assets.ts'
      const c = document.getElementById('c')
      const ctx = c.getContext('2d')
      await preloadAssets('/')
      const chars = ['cinnamoroll', 'cat', 'ditto', 'dragonball', 'godzilla']
      ctx.textAlign = 'center'
      ctx.fillStyle = '#fff'
      ctx.font = '13px sans-serif'
      chars.forEach((n, i) => {
        const cx = i * 180 + 90, cy = 130
        const img = getImage(n)
        if (img) drawImageCentered(ctx, img, cx, cy, 200)
        ctx.fillStyle = '#fff'
        ctx.fillText(n + (img ? '' : ' (none)'), cx, 250)
      })
      const targets = ['earth', 'city', 'word']
      targets.forEach((n, i) => {
        const x = i * 300, y = 300, w = 300, h = 260
        const img = getImage(n)
        if (img) { ctx.save(); ctx.translate(x, y); drawImageContain(ctx, img, w, h); ctx.restore() }
        ctx.fillStyle = '#fff'
        ctx.fillText(n + (img ? '' : ' (none)'), x + 150, y + 280)
      })
    </script>
  </body>
</html>
