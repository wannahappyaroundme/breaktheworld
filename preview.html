<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { margin: 0; background: #2a2f45; }
      canvas { background: #fff; display: block; margin: 0 auto; }
    </style>
  </head>
  <body>
    <canvas id="c" width="1000" height="800"></canvas>
    <script type="module">
      import {
        drawCinnamoroll, drawThanos, drawGauntlet, drawIronman, drawHulk,
        drawGodzilla, drawSaiyan, drawCat, drawDitto, drawPooh,
      } from '/src/art/characters.ts'
      import { drawEarth } from '/src/art/earth-art.ts'
      import { drawCity } from '/src/art/city-art.ts'
      import { drawWord } from '/src/art/word-art.ts'

      const c = document.getElementById('c')
      const ctx = c.getContext('2d')
      ctx.fillStyle = '#fff'
      ctx.fillRect(0, 0, c.width, c.height)

      const CELL = 200
      const chars = [
        ['cinnamoroll', drawCinnamoroll], ['thanos', drawThanos], ['ironman', drawIronman],
        ['hulk', drawHulk], ['godzilla', drawGodzilla], ['saiyan', drawSaiyan],
        ['cat', drawCat], ['ditto', drawDitto], ['pooh', drawPooh], ['gauntlet', drawGauntlet],
      ]
      ctx.textAlign = 'center'
      let i = 0
      for (const [name, fn] of chars) {
        const col = i % 5, row = Math.floor(i / 5)
        const cx = col * CELL + CELL / 2, cy = row * CELL + CELL / 2
        ctx.save(); fn(ctx, cx, cy, 130); ctx.restore()
        ctx.fillStyle = '#000'; ctx.font = '13px sans-serif'
        ctx.fillText(name, cx, row * CELL + CELL - 6)
        i++
      }
      // targets on the bottom row (drawX(ctx,w,h) fill a cell)
      const targets = [['earth', drawEarth], ['city', drawCity], ['word', drawWord]]
      targets.forEach(([name, fn], k) => {
        const x = k * 320 + 10, y = 420
        ctx.save(); ctx.translate(x, y); fn(ctx, 300, 220); ctx.restore()
        ctx.fillStyle = '#000'; ctx.fillText(name, x + 150, y + 240)
      })
    </script>
  </body>
</html>
