<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- solid base (renders everywhere) -->
  <rect width="1200" height="630" fill="#0f1630"/>
  <ellipse cx="600" cy="250" rx="720" ry="420" fill="#1b2547" fill-opacity="0.7"/>

  <!-- scattered stars -->
  <g fill="#ffffff">
    <circle cx="120" cy="90" r="3" fill-opacity="0.6"/><circle cx="300" cy="60" r="2" fill-opacity="0.5"/>
    <circle cx="980" cy="80" r="3" fill-opacity="0.6"/><circle cx="1100" cy="160" r="2" fill-opacity="0.5"/>
    <circle cx="80" cy="320" r="2" fill-opacity="0.5"/><circle cx="1130" cy="430" r="3" fill-opacity="0.6"/>
    <circle cx="220" cy="520" r="2" fill-opacity="0.5"/><circle cx="1050" cy="560" r="2" fill-opacity="0.5"/>
  </g>

  <!-- shattered earth (left) -->
  <g transform="translate(360 350)" stroke="#0a0f22" stroke-width="6" stroke-linejoin="round">
    <path d="M-150 -40 L-70 -120 L-10 -70 L-60 -10 Z" fill="#4aa6e0"/>
    <path d="M-10 -70 L-70 -120 L40 -130 L70 -60 Z" fill="#7cc95a"/>
    <path d="M70 -60 L40 -130 L150 -70 L120 10 Z" fill="#4aa6e0"/>
    <path d="M-60 -10 L-10 -70 L40 -10 L0 60 Z" fill="#5fab3c"/>
    <path d="M40 -10 L120 10 L110 90 L20 80 Z" fill="#4aa6e0"/>
    <path d="M0 60 L20 80 L-30 140 L-110 90 Z" fill="#7cc95a"/>
    <path d="M-60 -10 L0 60 L-110 90 L-160 20 Z" fill="#b07b4f"/>
    <path d="M170 120 L210 100 L230 145 L185 160 Z" fill="#5fab3c"/>
  </g>

  <!-- yellow speed lines -->
  <g stroke="#ffd23f" stroke-width="11" stroke-linecap="round">
    <line x1="600" y1="150" x2="690" y2="90"/>
    <line x1="610" y1="210" x2="712" y2="178"/>
    <line x1="600" y1="270" x2="702" y2="270"/>
    <line x1="592" y1="118" x2="642" y2="52"/>
  </g>

  <!-- cute fluffy character diving in (cinnamoroll-ish) -->
  <g transform="translate(720 215)">
    <ellipse cx="-55" cy="35" rx="26" ry="60" fill="#fffdf6" stroke="#211d2b" stroke-width="6" transform="rotate(-30 -55 35)"/>
    <ellipse cx="55" cy="35" rx="26" ry="60" fill="#fffdf6" stroke="#211d2b" stroke-width="6" transform="rotate(30 55 35)"/>
    <circle cx="0" cy="0" r="70" fill="#fffdf6" stroke="#211d2b" stroke-width="6"/>
    <circle cx="-26" cy="-4" r="8" fill="#211d2b"/>
    <circle cx="26" cy="-4" r="8" fill="#211d2b"/>
    <circle cx="-40" cy="18" r="11" fill="#ffb3c0"/>
    <circle cx="40" cy="18" r="11" fill="#ffb3c0"/>
    <path d="M-16 14 q16 16 32 0" fill="none" stroke="#211d2b" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- title: dark outline behind + bright fill front -->
  <g font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="74" text-anchor="middle" letter-spacing="1">
    <text x="600" y="495" fill="none" stroke="#211d2b" stroke-width="10" stroke-linejoin="round">BREAK THE WORLD</text>
    <text x="600" y="495" fill="#ffd23f">BREAK THE WORLD</text>
  </g>
  <text x="600" y="566" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-weight="800" font-size="40" fill="#ffffff">세상 부수기 · 스트레스 해소</text>
</svg>
